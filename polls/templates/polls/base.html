<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Election System{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .vote-btn { transition: transform 0.1s; }
    .vote-btn:active { transform: scale(0.97); }
    .progress { height: 28px; border-radius: 8px; }
    .progress-bar { font-size: 0.9rem; font-weight: 500; }
    .candidate-card {
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-radius: 12px;
      transition: box-shadow 0.2s;
    }
    .candidate-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.13); }
    .alert-banner {
      border-radius: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'home' %}">🗳️ Election System</a>
      <div class="d-flex align-items-center gap-3">
        {% if request.session.voter_id %}
        <span class="text-white-50 small">{{ request.session.voter_name }}</span>
        <a href="{% url 'results' %}" class="btn btn-outline-light btn-sm">ผลลัพธ์</a>
        <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">ออกจากระบบ</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container" style="max-width: 720px;">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible alert-banner fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
